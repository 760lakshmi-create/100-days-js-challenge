<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Password Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d10;
      --surface: #16161c;
      --surface2: #1e1e27;
      --border: #2a2a38;
      --accent: #7c6fe0;
      --accent2: #c084fc;
      --green: #4ade80;
      --yellow: #fbbf24;
      --red: #f87171;
      --text: #e8e8f0;
      --muted: #6b6b80;
      --radius: 14px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Grotesk', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    /* Ambient background blobs */
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.12;
      pointer-events: none;
      z-index: 0;
    }
    body::before {
      width: 400px; height: 400px;
      background: var(--accent);
      top: -80px; left: -80px;
    }
    body::after {
      width: 300px; height: 300px;
      background: var(--accent2);
      bottom: -60px; right: -60px;
    }

    .card {
      position: relative;
      z-index: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 40px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 32px 80px rgba(0,0,0,0.5);
    }

    .header { margin-bottom: 32px; }
    .header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, #e8e8f0 30%, var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .header p {
      color: var(--muted);
      font-size: 0.88rem;
      margin-top: 6px;
    }

    /* Password display box */
    .pw-box {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
      transition: border-color 0.2s;
    }
    .pw-box:hover { border-color: var(--accent); }
    .pw-text {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.05rem;
      flex: 1;
      word-break: break-all;
      color: var(--text);
      letter-spacing: 0.04em;
      min-height: 24px;
      user-select: all;
    }
    .pw-text.placeholder { color: var(--muted); font-size: 0.9rem; }

    .icon-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 6px;
      border-radius: 8px;
      color: var(--muted);
      transition: color 0.15s, background 0.15s;
      display: flex;
      align-items: center;
    }
    .icon-btn:hover { color: var(--text); background: var(--border); }
    .icon-btn svg { width: 18px; height: 18px; }

    /* Strength bar */
    .strength-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
    }
    .strength-bars {
      display: flex;
      gap: 5px;
      flex: 1;
    }
    .bar {
      flex: 1;
      height: 5px;
      border-radius: 99px;
      background: var(--border);
      transition: background 0.35s;
    }
    .strength-label {
      font-size: 0.78rem;
      font-weight: 600;
      width: 52px;
      text-align: right;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      transition: color 0.3s;
      color: var(--muted);
    }

    /* Controls */
    .section-label {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      font-weight: 600;
      margin-bottom: 10px;
    }

    .slider-group { margin-bottom: 28px; }
    .slider-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .length-val {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--accent2);
    }
    input[type=range] {
      -webkit-appearance: none;
      width: 100%;
      height: 5px;
      border-radius: 99px;
      outline: none;
      cursor: pointer;
      background: linear-gradient(to right, var(--accent) 0%, var(--accent) var(--pct, 50%), var(--border) var(--pct, 50%));
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 20px; height: 20px;
      border-radius: 50%;
      background: white;
      border: 3px solid var(--accent);
      box-shadow: 0 0 0 3px rgba(124,111,224,0.25);
      cursor: pointer;
      transition: box-shadow 0.15s;
    }
    input[type=range]::-webkit-slider-thumb:hover {
      box-shadow: 0 0 0 6px rgba(124,111,224,0.3);
    }

    /* Toggles */
    .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 28px; }
    .toggle-item {
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      user-select: none;
    }
    .toggle-item:hover { border-color: var(--accent); }
    .toggle-item.active {
      border-color: var(--accent);
      background: rgba(124,111,224,0.1);
    }
    .toggle-box {
      width: 18px; height: 18px;
      border-radius: 5px;
      border: 1.5px solid var(--muted);
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, border-color 0.15s;
      flex-shrink: 0;
    }
    .toggle-item.active .toggle-box {
      background: var(--accent);
      border-color: var(--accent);
    }
    .toggle-box svg { display: none; }
    .toggle-item.active .toggle-box svg { display: block; }
    .toggle-name { font-size: 0.85rem; font-weight: 500; }
    .toggle-sample {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      color: var(--muted);
      margin-left: auto;
    }

    /* Quantity */
    .qty-row { display: flex; align-items: center; gap: 10px; margin-bottom: 28px; }
    .qty-btn {
      width: 36px; height: 36px;
      border-radius: 8px;
      border: 1.5px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      font-size: 1.2rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: border-color 0.15s;
    }
    .qty-btn:hover { border-color: var(--accent); }
    .qty-val {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1rem;
      font-weight: 700;
      min-width: 28px;
      text-align: center;
    }
    .qty-label { color: var(--muted); font-size: 0.85rem; margin-left: 4px; }

    /* Generate button */
    .gen-btn {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: var(--radius);
      color: white;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      position: relative;
      overflow: hidden;
    }
    .gen-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0);
      transition: background 0.2s;
    }
    .gen-btn:hover::after { background: rgba(255,255,255,0.08); }
    .gen-btn:active { transform: scale(0.98); }

    /* Multi-password list */
    .pw-list { margin-top: 24px; display: flex; flex-direction: column; gap: 8px; }
    .pw-list-item {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 11px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      animation: slideIn 0.2s ease;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .pw-list-text {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.82rem;
      flex: 1;
      word-break: break-all;
      color: var(--text);
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--surface2);
      border: 1px solid var(--accent);
      color: var(--text);
      padding: 10px 20px;
      border-radius: 99px;
      font-size: 0.85rem;
      font-weight: 500;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s, transform 0.2s;
      z-index: 100;
      white-space: nowrap;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 420px) {
      .card { padding: 28px 20px; }
      .options-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="card">
  <div class="header">
    <h1>🔐 Password Generator</h1>
    <p>Strong, random passwords — generated instantly</p>
  </div>

  <!-- Password display -->
  <div class="pw-box">
    <div class="pw-text placeholder" id="pwDisplay">Click Generate →</div>
    <button class="icon-btn" id="refreshBtn" title="Regenerate">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M23 4v6h-6"/><path d="M1 20v-6h6"/>
        <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
      </svg>
    </button>
    <button class="icon-btn" id="copyBtn" title="Copy password">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
      </svg>
    </button>
  </div>

  <!-- Strength bar -->
  <div class="strength-row">
    <div class="strength-bars">
      <div class="bar" id="b1"></div>
      <div class="bar" id="b2"></div>
      <div class="bar" id="b3"></div>
      <div class="bar" id="b4"></div>
    </div>
    <div class="strength-label" id="strengthLabel">—</div>
  </div>

  <!-- Length slider -->
  <div class="slider-group">
    <div class="slider-top">
      <span class="section-label">Length</span>
      <span class="length-val" id="lengthVal">16</span>
    </div>
    <input type="range" id="lengthSlider" min="4" max="64" value="16" />
  </div>

  <!-- Character options -->
  <div class="section-label">Include</div>
  <div class="options-grid" id="optionsGrid">
    <div class="toggle-item active" data-key="upper">
      <div class="toggle-box">
        <svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="white" stroke-width="2"><polyline points="1,5 4,8 9,2"/></svg>
      </div>
      <span class="toggle-name">Uppercase</span>
      <span class="toggle-sample">ABC</span>
    </div>
    <div class="toggle-item active" data-key="lower">
      <div class="toggle-box">
        <svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="white" stroke-width="2"><polyline points="1,5 4,8 9,2"/></svg>
      </div>
      <span class="toggle-name">Lowercase</span>
      <span class="toggle-sample">abc</span>
    </div>
    <div class="toggle-item active" data-key="numbers">
      <div class="toggle-box">
        <svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="white" stroke-width="2"><polyline points="1,5 4,8 9,2"/></svg>
      </div>
      <span class="toggle-name">Numbers</span>
      <span class="toggle-sample">123</span>
    </div>
    <div class="toggle-item active" data-key="symbols">
      <div class="toggle-box">
        <svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="white" stroke-width="2"><polyline points="1,5 4,8 9,2"/></svg>
      </div>
      <span class="toggle-name">Symbols</span>
      <span class="toggle-sample">!@#</span>
    </div>
  </div>

  <!-- Quantity -->
  <div class="section-label">Quantity</div>
  <div class="qty-row">
    <button class="qty-btn" id="qtyMinus">−</button>
    <span class="qty-val" id="qtyVal">1</span>
    <button class="qty-btn" id="qtyPlus">+</button>
    <span class="qty-label">password(s) at a time</span>
  </div>

  <!-- Generate -->
  <button class="gen-btn" id="genBtn">Generate Password</button>

  <!-- Password list (shown when qty > 1) -->
  <div class="pw-list" id="pwList"></div>
</div>

<div class="toast" id="toast">Copied to clipboard!</div>

<script>
  const CHARS = {
    upper:   'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
    lower:   'abcdefghijklmnopqrstuvwxyz',
    numbers: '0123456789',
    symbols: '!@#$%^&*()_+-=[]{}|;:,.<>?'
  };

  let length = 16, qty = 1;
  const activeKeys = new Set(['upper','lower','numbers','symbols']);

  const lengthSlider = document.getElementById('lengthSlider');
  const lengthVal    = document.getElementById('lengthVal');
  const pwDisplay    = document.getElementById('pwDisplay');
  const copyBtn      = document.getElementById('copyBtn');
  const refreshBtn   = document.getElementById('refreshBtn');
  const genBtn       = document.getElementById('genBtn');
  const qtyVal       = document.getElementById('qtyVal');
  const qtyMinus     = document.getElementById('qtyMinus');
  const qtyPlus      = document.getElementById('qtyPlus');
  const pwList       = document.getElementById('pwList');
  const toast        = document.getElementById('toast');

  // Slider
  function updateSlider() {
    const pct = ((length - 4) / (64 - 4)) * 100;
    lengthSlider.style.setProperty('--pct', pct + '%');
    lengthVal.textContent = length;
  }
  lengthSlider.addEventListener('input', () => {
    length = +lengthSlider.value;
    updateSlider();
  });
  updateSlider();

  // Toggles
  document.getElementById('optionsGrid').addEventListener('click', e => {
    const item = e.target.closest('.toggle-item');
    if (!item) return;
    const key = item.dataset.key;
    const willRemove = item.classList.contains('active');
    // At least one must stay active
    if (willRemove && activeKeys.size === 1) return;
    item.classList.toggle('active');
    if (willRemove) activeKeys.delete(key); else activeKeys.add(key);
  });

  // Quantity
  qtyMinus.addEventListener('click', () => {
    if (qty > 1) { qty--; qtyVal.textContent = qty; updateGenBtn(); }
  });
  qtyPlus.addEventListener('click', () => {
    if (qty < 10) { qty++; qtyVal.textContent = qty; updateGenBtn(); }
  });
  function updateGenBtn() {
    genBtn.textContent = qty === 1 ? 'Generate Password' : `Generate ${qty} Passwords`;
  }

  // Generate
  function generateOne() {
    let pool = '';
    let required = '';
    activeKeys.forEach(k => {
      pool += CHARS[k];
      required += CHARS[k][Math.floor(Math.random() * CHARS[k].length)];
    });
    let pw = required;
    for (let i = required.length; i < length; i++) {
      pw += pool[Math.floor(Math.random() * pool.length)];
    }
    return pw.split('').sort(() => Math.random() - 0.5).join('');
  }

  function calcStrength(pw) {
    let score = 0;
    if (/[a-z]/.test(pw)) score++;
    if (/[A-Z]/.test(pw)) score++;
    if (/[0-9]/.test(pw)) score++;
    if (/[^a-zA-Z0-9]/.test(pw)) score++;
    if (pw.length >= 12) score++;
    if (pw.length >= 20) score++;
    return Math.min(4, Math.floor(score * 4 / 6));
  }

  const strengthConfig = [
    { label: 'Weak',   color: '#f87171' },
    { label: 'Fair',   color: '#fbbf24' },
    { label: 'Good',   color: '#a3e635' },
    { label: 'Strong', color: '#4ade80' },
  ];

  function updateStrength(pw) {
    const s = calcStrength(pw);
    const cfg = strengthConfig[Math.max(0, s - 1)] || { label: '—', color: '#6b6b80' };
    for (let i = 1; i <= 4; i++) {
      const bar = document.getElementById('b' + i);
      bar.style.background = i <= s ? cfg.color : 'var(--border)';
    }
    const lbl = document.getElementById('strengthLabel');
    lbl.textContent = pw ? cfg.label : '—';
    lbl.style.color = pw ? cfg.color : 'var(--muted)';
  }

  function generate() {
    const passwords = Array.from({ length: qty }, generateOne);

    if (qty === 1) {
      const pw = passwords[0];
      pwDisplay.textContent = pw;
      pwDisplay.classList.remove('placeholder');
      updateStrength(pw);
      pwList.innerHTML = '';
    } else {
      pwDisplay.textContent = passwords[0];
      pwDisplay.classList.remove('placeholder');
      updateStrength(passwords[0]);

      pwList.innerHTML = '';
      passwords.forEach((pw, i) => {
        const item = document.createElement('div');
        item.className = 'pw-list-item';
        item.style.animationDelay = (i * 0.04) + 's';
        item.innerHTML = `
          <span class="pw-list-text">${pw}</span>
          <button class="icon-btn" title="Copy" onclick="copyText('${pw}')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
            </svg>
          </button>`;
        pwList.appendChild(item);
      });
    }
  }

  genBtn.addEventListener('click', generate);
  refreshBtn.addEventListener('click', generate);

  // Copy
  function copyText(text) {
    navigator.clipboard.writeText(text).then(showToast);
  }
  copyBtn.addEventListener('click', () => {
    const pw = pwDisplay.textContent;
    if (!pw || pw === 'Click Generate →') return;
    copyText(pw);
  });

  function showToast() {
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
  }

  // Generate on load
  generate();
</script>
</body>
</html>
