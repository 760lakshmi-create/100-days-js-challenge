<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Age Calculator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background-color: #ffcc80;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0px 5px 15px rgba(0, 0, 0, 0.2);
        }

        h2 {
            margin-bottom: 20px;
        }

        input {
            padding: 10px;
            border: 1px solid #333;
            border-radius: 5px;
            text-align: center;
            font-size: 16px;
        }

        button {
            background-color: #000;
            color: white;
            border: none;
            padding: 10px 15px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
            border-radius: 5px;
        }

        button:hover {
            background-color: #444;
        }

        .result {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Age Calculator</h2>
        <label>Select Your Birth Date:</label><br>
        <input type="date" id="birthdate">
        <br><br>
        <button onclick="calculateAge()">Get Age</button>
        <div class="result" id="result"></div>
    </div>

    <script>
        function calculateAge() {
            let birthDateInput = document.getElementById("birthdate").value;
            let resultDiv = document.getElementById("result");

            if (!birthDateInput) {
                resultDiv.innerHTML = "Please select a valid date!";
                return;
            }

            let birthDate = new Date(birthDateInput);
            let today = new Date();

            if (birthDate > today) {
                resultDiv.innerHTML = "Invalid Date! You can't be born in the future.";
                return;
            }

            let ageYears = today.getFullYear() - birthDate.getFullYear();
            let ageMonths = today.getMonth() - birthDate.getMonth();
            let ageDays = today.getDate() - birthDate.getDate();

            if (ageDays < 0) {
                ageMonths--;
                let prevMonth = new Date(today.getFullYear(), today.getMonth(), 0);
                ageDays += prevMonth.getDate();
            }

            if (ageMonths < 0) {
                ageYears--;
                ageMonths += 12;
            }

            resultDiv.innerHTML = `Your Age is <strong>${ageYears} Years ${ageMonths} Months ${ageDays} Days</strong>`;
        }
    </script>

</body>
</html>
